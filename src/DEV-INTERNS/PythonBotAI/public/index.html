<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot - Test Interface</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="chat-wrapper">
        <!-- Header -->
        <div class="header">
          <h1>pythonAI prototype</h1>
          <p class="subtitle">Powered by Ollama + Python</p>
          <button
            id="connectBtn"
            class="connect-btn"
            title="Connect to company system"
          >
            🔗 Connect Account
          </button>
        </div>

        <!-- Connect / Login Panel -->
        <div id="connectPanel" class="connect-panel hidden">
          <div class="connect-panel-inner">
            <strong>Connect to Company System</strong>
            <p class="connect-hint">
              Enter your clone.ulap.biz credentials so the AI can access live
              data.
            </p>
            <form id="connectForm">
              <input
                type="email"
                id="siteUsername"
                placeholder="Email / Username"
                autocomplete="username"
                required
              />
              <input
                type="password"
                id="sitePassword"
                placeholder="Password"
                autocomplete="current-password"
                required
              />
              <div class="terms-checkbox">
                <input type="checkbox" id="termsCheckbox" required />
                <label for="termsCheckbox">
                  I agree to the Terms and Conditions
                </label>
              </div>
              <div
                id="connectedAccountInfo"
                class="connected-account hidden"
              ></div>
              <div class="connect-actions">
                <button type="submit" id="connectSubmitBtn">Connect</button>
                <button type="button" id="logoutBtn" class="hidden">
                  Log out
                </button>
                <button type="button" id="connectCancelBtn">Cancel</button>
              </div>
            </form>
            <div id="connectStatus" class="connect-status"></div>
          </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
          <div class="message ai-message">
            <span class="avatar">🤖</span>
            <div class="message-content">
              Hello! I'm an AI assistant. Ask me anything or teach me new
              responses!
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <form id="chatForm" onsubmit="sendMessage(event)">
            <input
              type="text"
              id="userInput"
              placeholder="Type your message here..."
              autocomplete="off"
            />
            <button type="submit" id="sendBtn">Send</button>
          </form>
        </div>

        <!-- Status -->
        <div class="status" id="status">Ready</div>
      </div>
    </div>

    <!-- Chart Modal -->
    <div id="chartModal" class="chart-modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div id="modalChartTitle" class="modal-chart-title"></div>
        <canvas id="modalChartCanvas"></canvas>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
